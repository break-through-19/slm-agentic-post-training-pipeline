# Stage 2B — Group Relative Policy Optimisation (online RL).
# Merged on top of base.yaml at runtime; only overrides are listed here.
#
# GRPO samples a group of completions per prompt during training, scores each
# with the verifiable BFCL reward, and pushes the policy toward the
# above-average completions in each group (no value network needed).
# DeepSeek-R1's algorithm at 1.5B scale.

# Defaults tuned to fit a single 24 GB GPU. GRPO is the most memory-intensive
# stage: it generates `num_generations` completions per prompt, then runs
# policy + reference forward/backward over all of them. Group size 4 (down from
# the classic 8) plus a 1024 prompt cap keeps it inside 24 GB. If you still OOM,
# drop num_generations and per_device_batch_size to 2, or install vLLM and set
# use_vllm: true. On a 40/80 GB card raise both back to 8.
training:
  dataset: "xlam_grpo"                          # prompt dataset for online rollouts
  sft_checkpoint: "outputs/sft/checkpoint-final"
  max_samples: 2000                             # number of prompts to roll out over
  irrelevance_fraction: 0.25                    # Phase 1: blend in abstention prompts
  # Sprint step 4: point this at the output of scripts/curate_grpo_prompts.py to
  # train ONLY on informative prompts (rollouts disagree => non-zero advantage).
  # This is the real fix for the ~85% zero-variance groups. null = use raw xLAM.
  curated_prompts_path: null
  num_epochs: 1
  max_steps: -1                                 # -1 = use num_epochs; >0 = hard cap
  per_device_batch_size: 4                      # must be a multiple of num_generations
  gradient_accumulation_steps: 8
  gradient_checkpointing: true
  learning_rate: 1.0e-6                          # RL fine-tuning uses a tiny LR
  warmup_ratio: 0.1
  lr_scheduler: "constant"
  weight_decay: 0.0
  max_grad_norm: 0.2
  save_steps: 100
  # GRPO-specific knobs
  beta: 0.04                                    # KL coefficient to the reference policy
  num_generations: 4                            # group size G (completions per prompt).
                                                # 4 is the 24 GB-safe default; raise to 8
                                                # (and per_device_batch_size to 8) on a
                                                # 40/80 GB card for stronger advantage estimates.
  max_completion_length: 256
  temperature: 1.0                              # Sprint step 4: raised 0.9 -> 1.0 for more
                                                # within-group diversity (cheap extra variance).
  scale_rewards: true                           # normalise advantages within each group
  use_vllm: false                               # set true on a GPU with vLLM installed
  # Phase 2: shaped partial-credit reward (format + name + per-argument) instead
  # of binary 0/1. Binary left ~88% of groups with zero reward variance (zero
  # advantage => no gradient); shaping gives GRPO a real learning signal.
  reward_shaping: true

data:
  max_seq_len: 1024         # caps the rollout prompt length

output:
  dir: "outputs/grpo"
