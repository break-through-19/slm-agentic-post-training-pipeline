# Stage 2A — Direct Preference Optimisation (offline).
# Merged on top of base.yaml at runtime; only overrides are listed here.
#
# DPO refines the Stage 1 SFT adapter using (chosen, rejected) preference pairs
# that were self-generated by the SFT model and graded with the BFCL verifier.
# The SFT adapter is loaded as the trainable policy; the reference model is the
# same network with the adapter disabled (LoRA makes this free).

training:
  dataset: "xlam_dpo"                          # registered preference-pair dataset
  pairs_path: "outputs/pairs/dpo_pairs.jsonl"  # written by `generate-pairs`
  sft_checkpoint: "outputs/sft/checkpoint-final"
  max_samples: null                            # null = use all generated pairs
  num_epochs: 1
  max_steps: -1                                # -1 = use num_epochs; >0 = hard cap
  per_device_batch_size: 2
  gradient_accumulation_steps: 4
  gradient_checkpointing: false
  learning_rate: 5.0e-6                         # DPO uses a far smaller LR than SFT
  warmup_ratio: 0.1
  lr_scheduler: "cosine"
  weight_decay: 0.0
  max_grad_norm: 1.0
  save_steps: 100
  # DPO-specific knobs
  beta: 0.1                                     # KL regularisation strength
  loss_type: "sigmoid"                          # standard DPO loss (Rafailov+ 2023)

output:
  dir: "outputs/dpo"
